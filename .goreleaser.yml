release:
  # release-please creates the GitHub release with the changelog;
  # goreleaser only uploads artifacts to it.
  mode: keep-existing
builds:
  - goos:
      - linux
      - windows
      - darwin
    ignore:
      - goos: darwin
        goarch: 386
    ldflags:
      - -s -w -X "main.airVersion={{.Version}}"
      - -s -w -X "main.goVersion={{.Env.GOVERSION}}"
    env:
      - CGO_ENABLED=0
archives:
  - id: tar.gz
    format: tar.gz
  - id: binary
    format: binary
